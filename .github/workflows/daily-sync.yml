name: Daily Meta Ads Sync

on:
  # Corre todos los días a las 10:00 UTC = 07:00 Argentina (UTC-3)
  schedule:
    - cron: '0 10 * * *'
  # También podés triggerearlo manualmente desde GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  sync:
    name: Sync Meta Ads data to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Meta sync
        env:
          META_ACCESS_TOKEN:         ${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID:           ${{ secrets.META_ACCOUNT_ID }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-meta.js

      - name: Notify on failure
        if: failure()
        run: echo "::error::El sync de Meta Ads falló. Revisar logs arriba."
